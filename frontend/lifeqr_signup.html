<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | LifeQR</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css">
  <script src="api-utils.js"></script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    .font-headline { font-family: 'Manrope', sans-serif; }
    .hero-gradient { background: linear-gradient(135deg, #6818f4 0%, #4f3bb3 100%); }
  </style>
</head>
<body class="bg-gradient-to-br from-purple-50 to-white min-h-screen">
  
  <!-- Header -->
  <header class="px-6 py-4 bg-white/70 backdrop-blur-xl border-b border-gray-200/50">
    <div class="max-w-7xl mx-auto flex items-center justify-between">
      <a href="index.html" class="flex items-center gap-2">
        <div class="text-[#6818f4]">
          <svg fill="currentColor" viewBox="0 0 48 48" class="w-7 h-7">
            <path d="M24 4H6V17.3333V30.6667H24V44H42V30.6667V17.3333H24V4Z"></path>
          </svg>
        </div>
        <h1 class="font-headline text-xl font-extrabold bg-gradient-to-r from-[#6818f4] to-[#5c4dbe] bg-clip-text text-transparent">LifeQR</h1>
      </a>
      <a href="lifeqr_login.html" class="text-sm text-gray-600 hover:text-purple-600">Already have an account? <span class="font-semibold">Sign In</span></a>
    </div>
  </header>

  <main class="px-6 py-12 max-w-2xl mx-auto">
    <div class="bg-white rounded-3xl shadow-2xl p-8 md:p-12">
      <h2 class="font-headline text-3xl font-bold text-center mb-2">Create Your Account</h2>
      <p class="text-center text-gray-600 mb-8">Choose your role to get started</p>

      <!-- Role Selection -->
      <div class="grid grid-cols-3 gap-4 mb-8">
        <button onclick="selectRole('patient')" id="role-patient" class="role-btn p-4 border-2 rounded-xl text-center transition hover:border-purple-500">
          <span class="material-symbols-outlined text-3xl block mb-2">person</span>
          <span class="text-sm font-semibold">Patient</span>
        </button>
        <button onclick="selectRole('doctor')" id="role-doctor" class="role-btn p-4 border-2 border-gray-200 rounded-xl text-center transition hover:border-purple-500">
          <span class="material-symbols-outlined text-3xl block mb-2">medical_services</span>
          <span class="text-sm font-semibold">Doctor</span>
        </button>
        <button onclick="selectRole('crew')" id="role-crew" class="role-btn p-4 border-2 border-gray-200 rounded-xl text-center transition hover:border-purple-500">
          <span class="material-symbols-outlined text-3xl block mb-2">emergency</span>
          <span class="text-sm font-semibold">Crew</span>
        </button>
      </div>

      <!-- Signup Form -->
      <form id="signupForm" class="space-y-6">
        <input type="hidden" id="role" name="role" value="patient">

        <!-- Common Fields -->
        <div>
          <label class="block text-sm font-semibold mb-2">Full Name *</label>
          <input type="text" id="name" name="name" required class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-purple-500 focus:border-transparent">
        </div>

        <div class="grid md:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-semibold mb-2">Email *</label>
            <input type="email" id="email" name="email" required class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-purple-500 focus:border-transparent">
          </div>
          <div>
            <label class="block text-sm font-semibold mb-2">Phone</label>
            <input type="tel" id="phone" name="phone" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-purple-500 focus:border-transparent">
          </div>
        </div>

        <div>
          <label class="block text-sm font-semibold mb-2">Password *</label>
          <input type="password" id="password" name="password" required minlength="6" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-purple-500 focus:border-transparent">
        </div>

        <!-- Patient-specific Fields -->
        <div id="patientFields" class="space-y-4">
          <h3 class="font-semibold text-lg mt-6 mb-4">Medical Information</h3>
          <div class="grid md:grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-semibold mb-2">Age</label>
              <input type="number" id="age" name="age" min="0" max="150" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-purple-500 focus:border-transparent">
            </div>
            <div>
              <label class="block text-sm font-semibold mb-2">Blood Group</label>
              <select id="bloodGroup" name="bloodGroup" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-purple-500 focus:border-transparent">
                <option value="">Select</option>
                <option value="A+">A+</option>
                <option value="A-">A-</option>
                <option value="B+">B+</option>
                <option value="B-">B-</option>
                <option value="AB+">AB+</option>
                <option value="AB-">AB-</option>
                <option value="O+">O+</option>
                <option value="O-">O-</option>
              </select>
            </div>
          </div>
          <div>
            <label class="block text-sm font-semibold mb-2">Allergies</label>
            <textarea id="allergies" name="allergies" rows="2" placeholder="e.g., Penicillin, Peanuts" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-purple-500 focus:border-transparent"></textarea>
          </div>
          <div>
            <label class="block text-sm font-semibold mb-2">Current Medications</label>
            <textarea id="medications" name="medications" rows="2" placeholder="List your current medications" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-purple-500 focus:border-transparent"></textarea>
          </div>
          <div>
            <label class="block text-sm font-semibold mb-2">Health Issues / Conditions</label>
            <textarea id="healthIssues" name="healthIssues" rows="2" placeholder="e.g., Diabetes, Asthma" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-purple-500 focus:border-transparent"></textarea>
          </div>
          <h4 class="font-semibold mt-4 mb-2">Emergency Contact</h4>
          <div class="grid md:grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-semibold mb-2">Contact Name</label>
              <input type="text" id="emergencyContactName" name="emergencyContactName" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-purple-500 focus:border-transparent">
            </div>
            <div>
              <label class="block text-sm font-semibold mb-2">Contact Phone</label>
              <input type="tel" id="emergencyContactPhone" name="emergencyContactPhone" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-purple-500 focus:border-transparent">
            </div>
          </div>
        </div>

        <!-- Doctor-specific Fields -->
        <div id="doctorFields" class="space-y-4 hidden">
          <h3 class="font-semibold text-lg mt-6 mb-4">Professional Information</h3>
          <div>
            <label class="block text-sm font-semibold mb-2">Specialization</label>
            <input type="text" id="specialization" name="specialization" placeholder="e.g., Cardiology" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-purple-500 focus:border-transparent">
          </div>
          <div>
            <label class="block text-sm font-semibold mb-2">License Number</label>
            <input type="text" id="licenseNumber" name="licenseNumber" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-purple-500 focus:border-transparent">
          </div>
          <div>
            <label class="block text-sm font-semibold mb-2">Hospital/Clinic</label>
            <input type="text" id="hospital" name="hospital" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-purple-500 focus:border-transparent">
          </div>
        </div>

        <!-- Crew-specific Fields -->
        <div id="crewFields" class="space-y-4 hidden">
          <h3 class="font-semibold text-lg mt-6 mb-4">Crew Information</h3>
          <div>
            <label class="block text-sm font-semibold mb-2">Vehicle Number</label>
            <input type="text" id="vehicleNumber" name="vehicleNumber" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-purple-500 focus:border-transparent">
          </div>
          <div>
            <label class="block text-sm font-semibold mb-2">Crew Type</label>
            <select id="crewType" name="crewType" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-purple-500 focus:border-transparent">
              <option value="">Select</option>
              <option value="ambulance">Ambulance</option>
              <option value="fire">Fire Department</option>
              <option value="police">Police</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-semibold mb-2">Station</label>
            <input type="text" id="station" name="station" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-purple-500 focus:border-transparent">
          </div>
        </div>

        <!-- Error Message -->
        <div id="errorMessage" class="hidden bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-xl text-sm"></div>

        <!-- Submit Button -->
        <button type="submit" id="submitBtn" class="w-full hero-gradient text-white px-8 py-4 rounded-xl text-base font-bold shadow-xl hover:shadow-2xl transition">
          Create Account
        </button>
      </form>

      <p class="text-center text-sm text-gray-600 mt-6">
        By signing up, you agree to our Terms of Service and Privacy Policy
      </p>
    </div>
  </main>

  <script>
    // Determine API URL based on current location
    const API_URL = window.location.origin + '/api';
    
    let currentRole = 'patient';

    function selectRole(role) {
      currentRole = role;
      document.getElementById('role').value = role;
      
      // Update button styles
      document.querySelectorAll('.role-btn').forEach(btn => {
        btn.classList.remove('border-purple-500', 'bg-purple-50');
        btn.classList.add('border-gray-200');
      });
      document.getElementById(`role-${role}`).classList.remove('border-gray-200');
      document.getElementById(`role-${role}`).classList.add('border-purple-500', 'bg-purple-50');
      
      // Show/hide role-specific fields
      document.getElementById('patientFields').classList.toggle('hidden', role !== 'patient');
      document.getElementById('doctorFields').classList.toggle('hidden', role !== 'doctor');
      document.getElementById('crewFields').classList.toggle('hidden', role !== 'crew');
    }

    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const submitBtn = document.getElementById('submitBtn');
      const errorMessage = document.getElementById('errorMessage');
      
      errorMessage.classList.add('hidden');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Creating Account...';
      
      try {
        const formData = new FormData(e.target);
        const data = Object.fromEntries(formData.entries());
        
        const response = await fetch(`${API_URL}/auth/register`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify(data)
        });
        
        let result;
        const contentType = response.headers.get('content-type') || '';
        if (contentType.includes('application/json')) {
          result = await response.json();
        } else {
          const text = await response.text();
          throw new Error(text || 'Registration failed. Server did not return valid JSON.');
        }
        
        if (!response.ok) {
          throw new Error(result.error || 'Registration failed');
        }
        
        // Clear any stale session data, then store token and session info
        localStorage.clear();
        localStorage.setItem('token', result.token);
        localStorage.setItem('userRole', result.user.role || 'patient');
        localStorage.setItem('userName', result.user.name || 'User');
        localStorage.setItem('userId', result.user.id);
        
        // Redirect to appropriate dashboard
        if (result.user.role === 'patient') {
          window.location.href = 'patient_dashboard.html';
        } else if (result.user.role === 'doctor') {
          window.location.href = 'doctor_dashboard.html';
        } else if (result.user.role === 'crew') {
          window.location.href = 'CrewAmbulance_dashboard.html';
        }
      } catch (error) {
        errorMessage.textContent = error.message;
        errorMessage.classList.remove('hidden');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Create Account';
      }
    });

    window.addEventListener('load', async () => {
      const token = localStorage.getItem('token');
      if (!token) return;

      const user = await verifyToken();
      if (!user) {
        localStorage.clear();
        return;
      }

      if (user.role === 'patient') {
        window.location.href = 'patient_dashboard.html';
      } else if (user.role === 'doctor') {
        window.location.href = 'doctor_dashboard.html';
      } else if (user.role === 'crew') {
        window.location.href = 'CrewAmbulance_dashboard.html';
      }
    });

    // Initialize
    selectRole('patient');
  </script>

</body>
</html>
