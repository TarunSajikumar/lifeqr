<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emergency Access | LifeQR</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
  <link rel="stylesheet" href="dist/output.css">
  <link rel="stylesheet" href="styles.css">
  <script src="js/toast.js"></script>
  <script src="js/emergency-access.js"></script>
</head>
<body class="bg-mesh text-gray-900 antialiased">
  
  <!-- Header -->
  <header class="px-6 py-4 bg-white/70 backdrop-blur-xl border-b border-gray-200/50 sticky top-0 z-40 no-print">
    <div class="max-w-7xl mx-auto flex items-center justify-between">
      <div class="flex items-center gap-2">
        <div class="text-[#6818f4]">
          <svg fill="currentColor" viewBox="0 0 48 48" class="w-7 h-7">
            <path d="M24 4H6V17.3333V30.6667H24V44H42V30.6667V17.3333H24V4Z"></path>
          </svg>
        </div>
        <h1 class="font-headline text-xl font-extrabold bg-gradient-to-r from-[#6818f4] to-[#5c4dbe] bg-clip-text text-transparent">LifeQR</h1>
      </div>
      
      <!-- Language selection dropdown -->
      <div class="flex items-center gap-2">
        <span class="material-symbols-outlined text-gray-500 text-lg">language</span>
        <select id="languageSelector" class="px-2.5 py-1 border border-gray-300 rounded-lg text-xs font-semibold bg-white/80 focus:ring-2 focus:ring-purple-500 focus:border-transparent">
          <option value="en">English</option>
          <option value="hi">हिंदी (Hindi)</option>
          <option value="kn">ಕನ್ನಡ (Kannada)</option>
          <option value="ta">தமிழ் (Tamil)</option>
        </select>
      </div>
    </div>
  </header>

  <main class="px-6 py-12 max-w-2xl mx-auto print-page">
    <!-- Header title -->
    <div class="text-center mb-8 no-print">
      <h2 id="mainTitle" class="font-headline text-3xl font-bold mb-2">Emergency Medical Profile</h2>
      <p id="mainSubtitle" class="text-gray-600">Verify medical lifeline details instantly</p>
    </div>

    <!-- Details Card Container -->
    <div class="bg-white rounded-3xl shadow-2xl p-8 border border-red-100" id="emergencyDetailsCard">
      <!-- Loading skeletons state -->
      <div class="space-y-4 skeleton" style="height: 350px;"></div>
    </div>
  </main>

</body>
</html>
