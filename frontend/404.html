<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | LifeQR</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-mesh text-gray-900 antialiased min-h-screen flex items-center justify-center">

  <div class="w-full max-w-md px-6 text-center">
    <div class="glass-card rounded-3xl p-8 shadow-2xl space-y-6">
      <div class="w-20 h-20 rounded-full bg-purple-100 text-[#6818f4] flex items-center justify-center mx-auto animate-bounce">
        <span class="material-symbols-outlined text-5xl">warning</span>
      </div>
      <div>
        <h1 class="font-headline text-5xl font-extrabold text-[#6818f4]">404</h1>
        <h2 class="font-headline text-xl font-bold mt-2">Page Not Found</h2>
        <p class="text-xs text-gray-500 mt-2">The emergency page or dashboard you are looking for does not exist or has been moved.</p>
      </div>
      <a href="/index.html" class="inline-flex w-full hero-gradient text-white px-6 py-3 rounded-xl text-sm font-bold shadow-md hover:shadow-lg transition justify-center items-center gap-2">
        <span class="material-symbols-outlined text-sm">home</span>
        Return to Safety
      </a>
    </div>
  </div>

</body>
</html>
