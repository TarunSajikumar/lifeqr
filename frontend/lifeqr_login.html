<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | LifeQR</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
  <link rel="stylesheet" href="dist/output.css">
  <link rel="stylesheet" href="styles.css">
  <script src="js/toast.js"></script>
  <script src="js/auth-guard.js"></script>
</head>
<body class="bg-gradient-to-br from-purple-50 to-white min-h-screen flex items-center justify-center">
  
  <div class="w-full max-w-md px-6">
    <!-- Logo -->
    <div class="text-center mb-8">
      <a href="index.html" class="inline-flex items-center gap-2 mb-4">
        <div class="text-[#6818f4]">
          <svg fill="currentColor" viewBox="0 0 48 48" class="w-10 h-10">
            <path d="M24 4H6V17.3333V30.6667H24V44H42V30.6667V17.3333H24V4Z"></path>
          </svg>
        </div>
        <h1 class="font-headline text-2xl font-extrabold bg-gradient-to-r from-[#6818f4] to-[#5c4dbe] bg-clip-text text-transparent">LifeQR</h1>
      </a>
      <h2 class="font-headline text-3xl font-bold mb-2" id="login-title">Welcome Back</h2>
      <p class="text-gray-600" id="login-subtitle">Sign in to access your account</p>
    </div>

    <!-- Login Form -->
    <div class="bg-white rounded-3xl shadow-2xl p-8" id="form-container">
      <form id="loginForm" class="space-y-6">
        <div>
          <label class="block text-sm font-semibold mb-2">Email</label>
          <input 
            type="email" 
            id="email" 
            name="email" 
            required 
            placeholder="your@email.com"
            class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-purple-500 focus:border-transparent"
          >
        </div>

        <div>
          <label class="block text-sm font-semibold mb-2">Password</label>
          <div class="relative">
            <input 
              type="password" 
              id="password" 
              name="password" 
              required 
              placeholder="••••••••"
              class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-purple-500 focus:border-transparent"
            >
            <button type="button" onclick="togglePasswordVisibility('password', 'password-toggle-icon')" class="absolute right-3 top-3 text-gray-500">
              <span id="password-toggle-icon" class="material-symbols-outlined text-xl">visibility</span>
            </button>
          </div>
        </div>

        <div class="flex items-center justify-between">
          <label class="flex items-center">
            <input type="checkbox" class="rounded text-purple-600 focus:ring-purple-500">
            <span class="ml-2 text-sm text-gray-600">Remember me</span>
          </label>
          <button type="button" onclick="showForgotPasswordForm()" class="text-sm text-purple-600 hover:text-purple-700 font-semibold">Forgot password?</button>
        </div>

        <!-- Submit Button -->
        <button 
          type="submit" 
          id="submitBtn"
          class="w-full hero-gradient text-white px-8 py-4 rounded-xl text-base font-bold shadow-xl hover:shadow-2xl transition"
        >
          Sign In
        </button>
      </form>

      <div class="mt-6 text-center" id="signup-prompt">
        <p class="text-sm text-gray-600">
          Don't have an account? 
          <a href="lifeqr_signup.html" class="text-purple-600 hover:text-purple-700 font-semibold">Sign Up</a>
        </p>
      </div>
    </div>
  </div>

  <script>
    // Redirect if already authenticated
    checkAuthPagesAccess();

    function togglePasswordVisibility(fieldId, iconId) {
      const input = document.getElementById(fieldId);
      const icon = document.getElementById(iconId);
      if (input.type === 'password') {
        input.type = 'text';
        icon.textContent = 'visibility_off';
      } else {
        input.type = 'password';
        icon.textContent = 'visibility';
      }
    }

    // Toggle forms (forgot password)
    function showForgotPasswordForm() {
      document.getElementById('login-title').textContent = 'Recover Password';
      document.getElementById('login-subtitle').textContent = 'Enter your email to receive a password reset link';
      
      const formContainer = document.getElementById('form-container');
      formContainer.innerHTML = `
        <form id="forgotForm" class="space-y-6">
          <div>
            <label class="block text-sm font-semibold mb-2">Email Address</label>
            <input 
              type="email" 
              id="forgotEmail" 
              required 
              placeholder="your@email.com"
              class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-purple-500 focus:border-transparent"
            >
          </div>
          <button 
            type="submit" 
            id="forgotSubmitBtn"
            class="w-full hero-gradient text-white px-8 py-4 rounded-xl text-base font-bold shadow-xl hover:shadow-2xl transition"
          >
            Send Reset Link
          </button>
          <div class="text-center mt-4">
            <button type="button" onclick="window.location.reload()" class="text-sm text-purple-600 hover:text-purple-700 font-semibold">Back to Login</button>
          </div>
        </form>
      `;

      document.getElementById('forgotForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('forgotEmail').value;
        const btn = document.getElementById('forgotSubmitBtn');
        btn.disabled = true;
        btn.textContent = 'Sending...';

        try {
          const response = await fetch('/api/v1/auth/forgot-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email })
          });

          const res = await response.json();
          if (!response.ok) throw new Error(res.error || 'Failed to request reset');

          showToast('Reset email dispatched successfully!', 'success');
          setTimeout(() => { window.location.reload(); }, 3000);
        } catch (err) {
          showToast(err.message, 'error');
          btn.disabled = false;
          btn.textContent = 'Send Reset Link';
        }
      });
    }

    // Check if resetToken is in query params
    const urlParams = new URLSearchParams(window.location.search);
    const resetToken = urlParams.get('resetToken');

    if (resetToken) {
      document.getElementById('login-title').textContent = 'Reset Password';
      document.getElementById('login-subtitle').textContent = 'Create a secure new password for your account';
      
      const formContainer = document.getElementById('form-container');
      formContainer.innerHTML = `
        <form id="resetForm" class="space-y-6">
          <div>
            <label class="block text-sm font-semibold mb-2">New Password *</label>
            <div class="relative">
              <input 
                type="password" 
                id="newPassword" 
                required 
                placeholder="••••••••"
                class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-purple-500 focus:border-transparent"
              >
              <button type="button" onclick="togglePasswordVisibility('newPassword', 'new-pass-icon')" class="absolute right-3 top-3 text-gray-500">
                <span id="new-pass-icon" class="material-symbols-outlined text-xl">visibility</span>
              </button>
            </div>
            
            <div class="mt-2 text-xs" id="password-strength-container">
              <div class="w-full bg-gray-200 h-1.5 rounded-full overflow-hidden">
                <div id="password-strength-bar" class="bg-red-500 h-full w-0 transition-all duration-300"></div>
              </div>
              <p id="password-strength-text" class="text-gray-500 mt-1 font-semibold">Password Strength: None</p>
            </div>
          </div>

          <div>
            <label class="block text-sm font-semibold mb-2">Confirm Password *</label>
            <div class="relative">
              <input 
                type="password" 
                id="confirmPassword" 
                required 
                placeholder="••••••••"
                class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-purple-500 focus:border-transparent"
              >
              <button type="button" onclick="togglePasswordVisibility('confirmPassword', 'confirm-pass-icon')" class="absolute right-3 top-3 text-gray-500">
                <span id="confirm-pass-icon" class="material-symbols-outlined text-xl">visibility</span>
              </button>
            </div>
          </div>

          <button 
            type="submit" 
            id="resetSubmitBtn"
            class="w-full hero-gradient text-white px-8 py-4 rounded-xl text-base font-bold shadow-xl hover:shadow-2xl transition"
          >
            Save Password
          </button>
        </form>
      `;

      // Password strength calculations
      const newPasswordInput = document.getElementById('newPassword');
      const strengthBar = document.getElementById('password-strength-bar');
      const strengthText = document.getElementById('password-strength-text');

      newPasswordInput.addEventListener('input', () => {
        const val = newPasswordInput.value;
        let score = 0;
        if (val.length >= 8) score++;
        if (/[A-Z]/.test(val)) score++;
        if (/[a-z]/.test(val)) score++;
        if (/[0-9]/.test(val)) score++;
        if (/[^A-Za-z0-9]/.test(val)) score++;

        let color = 'bg-red-500';
        let label = 'Very Weak';
        let width = '20%';

        if (score === 2) {
          color = 'bg-orange-500';
          label = 'Weak';
          width = '40%';
        } else if (score === 3) {
          color = 'bg-yellow-500';
          label = 'Medium';
          width = '60%';
        } else if (score === 4) {
          color = 'bg-blue-500';
          label = 'Good';
          width = '80%';
        } else if (score === 5) {
          color = 'bg-green-500';
          label = 'Strong';
          width = '100%';
        }

        if (val.length === 0) {
          width = '0%';
          label = 'None';
        }

        strengthBar.className = `${color} h-full transition-all duration-300`;
        strengthBar.style.width = width;
        strengthText.textContent = `Password Strength: ${label}`;
      });

      document.getElementById('resetForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const newPassword = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const btn = document.getElementById('resetSubmitBtn');

        if (newPassword !== confirmPassword) {
          showToast('Passwords do not match!', 'error');
          return;
        }

        const score = (newPassword.length >= 8 ? 1 : 0) +
                      (/[A-Z]/.test(newPassword) ? 1 : 0) +
                      (/[a-z]/.test(newPassword) ? 1 : 0) +
                      (/[0-9]/.test(newPassword) ? 1 : 0) +
                      (/[^A-Za-z0-9]/.test(newPassword) ? 1 : 0);
        
        if (score < 5) {
          showToast('New password is too weak.', 'error');
          return;
        }

        btn.disabled = true;
        btn.textContent = 'Updating...';

        try {
          const response = await fetch('/api/v1/auth/reset-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token: resetToken, newPassword })
          });

          const res = await response.json();
          if (!response.ok) throw new Error(res.error || 'Reset failed');

          showToast('Password updated successfully! Redirecting...', 'success');
          setTimeout(() => { window.location.href = 'lifeqr_login.html'; }, 2000);
        } catch (err) {
          showToast(err.message, 'error');
          btn.disabled = false;
          btn.textContent = 'Save Password';
        }
      });
    } else {
      // Standard Login Form Submission
      document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = true;
        submitBtn.textContent = 'Signing In...';
        
        try {
          const email = document.getElementById('email').value;
          const password = document.getElementById('password').value;
          
          const response = await fetch('/api/v1/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
          });
          
          const result = await response.json();
          
          if (!response.ok) {
            throw new Error(result.error || 'Login failed');
          }
          
          localStorage.clear();
          localStorage.setItem('token', result.token);
          localStorage.setItem('userRole', result.user.role);
          localStorage.setItem('userName', result.user.name);
          localStorage.setItem('userId', result.user.id);
          
          showToast('Signed in successfully!', 'success');
          
          setTimeout(() => {
            if (result.user.role === 'patient') {
              window.location.href = 'patient_dashboard.html';
            } else if (result.user.role === 'doctor') {
              window.location.href = 'doctor_dashboard.html';
            } else if (result.user.role === 'crew') {
              window.location.href = 'CrewAmbulance_dashboard.html';
            } else if (result.user.role === 'admin') {
              window.location.href = 'admin_dashboard.html';
            }
          }, 1000);
        } catch (error) {
          showToast(error.message, 'error');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Sign In';
        }
      });
    }
  </script>

</body>
</html>
